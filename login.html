<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login | BlogSphere</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&family=Open+Sans&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />
    <link rel="stylesheet" href="auth.css" />
  </head>
  <body class="auth-page">
    <div class="auth-container">
      <div class="auth-branding">
        <a href="index.html" class="logo">BlogSphere</a>
        <h1>Welcome back to your community</h1>
        <p>
          Log in to access your personalized dashboard, saved articles, and
          writing tools.
        </p>
        <img
          src="images/auth-illustration.svg"
          alt="Login illustration"
          class="auth-illustration"
        />
      </div>

      <div class="auth-form-container">
        <div class="auth-form-header">
          <h2>Log In</h2>
          <p>Don't have an account? <a href="register.html">Sign up</a></p>
        </div>

        <form id="loginForm" class="auth-form">
          <div class="form-group">
            <label for="email">Email Address</label>
            <div class="input-with-icon">
              <i class="fas fa-envelope"></i>
              <input
                type="email"
                id="email"
                placeholder="your@email.com"
                required
              />
            </div>
            <div class="error-message" id="email-error"></div>
          </div>

          <div class="form-group">
            <label for="password">Password</label>
            <div class="input-with-icon">
              <i class="fas fa-lock"></i>
              <input
                type="password"
                id="password"
                placeholder="••••••••"
                required
              />
              <i class="fas fa-eye" id="togglePassword"></i>
            </div>
            <div class="error-message" id="password-error"></div>
          </div>

          <div class="form-options">
            <label class="checkbox-container">
              <input type="checkbox" id="remember" />
              <span class="checkmark"></span>
              Remember me
            </label>
            <a href="forgot-password.html" class="text-link"
              >Forgot password?</a
            >
          </div>

          <button type="submit" class="btn btn-primary btn-block">
            <span class="btn-text">Log In</span>
            <i class="fas fa-spinner fa-spin btn-loader"></i>
          </button>

          <div class="auth-divider">
            <span>or continue with</span>
          </div>

          <div class="social-auth">
            <button type="button" class="btn btn-outline btn-social">
              <i class="fab fa-google"></i> Google
            </button>
            <button type="button" class="btn btn-outline btn-social">
              <i class="fab fa-twitter"></i> Twitter
            </button>
          </div>
        </form>

        <div class="auth-footer">
          By logging in, you agree to our <a href="#">Terms of Service</a> and
          <a href="#">Privacy Policy</a>.
        </div>
      </div>
    </div>

    <script src="auth.js"></script>
  </body>
</html>
