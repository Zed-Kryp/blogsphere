<!DOCTYPE html>
<html lang="en">
  <head>
    <link rel="stylesheet" href="auth.css" />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reset Password | BlogSphere</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&family=Open+Sans&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />
    <link rel="stylesheet" href="auth.css" />
  </head>
  <body class="auth-page">
    <div class="auth-container">
      <div class="auth-branding">
        <a href="index.html" class="logo">BlogSphere</a>
        <h1>Enter your new password</h1>
        <p>Enter the reset token and your new password below.</p>
        <img
          src="images/auth-illustration-3.svg"
          alt="Password reset illustration"
          class="auth-illustration"
        />
      </div>

      <div class="auth-form-container">
        <div class="auth-form-header">
          <h2>Reset Password</h2>
          <p>Remember your password? <a href="login.html">Log in</a></p>
        </div>

        <form id="resetPasswordForm" class="auth-form">
          <div class="form-group">
            <label for="token">Reset Token</label>
            <div class="input-with-icon">
              <i class="fas fa-key"></i>
              <input
                type="text"
                id="token"
                placeholder="Reset Token"
                required
              />
            </div>
            <div class="error-message" id="token-error"></div>
          </div>

          <div class="form-group">
            <label for="password">New Password</label>
            <div class="input-with-icon">
              <i class="fas fa-lock"></i>
              <input
                type="password"
                id="password"
                placeholder="New Password"
                required
              />
              <i class="fas fa-eye password-toggle" id="togglePassword"></i>
            </div>
            <div class="error-message" id="password-error"></div>
          </div>

          <div class="form-group">
            <label for="confirmPassword">Confirm New Password</label>
            <div class="input-with-icon">
              <i class="fas fa-lock"></i>
              <input
                type="password"
                id="confirmPassword"
                placeholder="Confirm New Password"
                required
              />
              <i
                class="fas fa-eye password-toggle"
                id="toggleConfirmPassword"
              ></i>
            </div>
            <div class="password-strength">
              <div class="strength-meter">
                <span class="strength-bar"></span>
                <span class="strength-bar"></span>
                <span class="strength-bar"></span>
                <span class="strength-bar"></span>
              </div>
              <span class="strength-text">Password strength</span>
            </div>
            <div class="error-message" id="confirm-error"></div>
          </div>
          <label class="checkbox-container">
            <input type="checkbox" id="showPassword" />
            <span class="checkmark"></span>
            Show password
          </label>

          <button type="submit" class="btn btn-primary btn-block">
            <span class="btn-text">Reset Password</span>
            <i class="fas fa-spinner fa-spin btn-loader"></i>
          </button>
        </form>
      </div>
    </div>

    <script src="auth.js"></script>
  </body>
</html>
